<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impact Share Card | Transformation Leader</title>
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <!-- Open Graph for social sharing -->
  <meta property="og:type" content="website" />
  <meta property="og:title" id="ogTitle" content="Impact Share Card | Transformation Leader" />
  <meta property="og:description" id="ogDesc" content="See the positive impact we're making through the Transformation Leader programme." />
  <meta property="og:image" content="https://ambassadors.t4leader.com/images/favicon.png" />
  <style>
    /* T4L brand: professional gold + dark for trust */
    :root {
      --t4l-gold: #D4A017;
      --t4l-gold-hover: #B8860B;
      --t4l-gold-muted: rgba(212, 160, 23, 0.15);
      --t4l-dark: #0B0B0F;
      --t4l-dark-soft: #1e293b;
    }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f9fa;
      position: relative;
      overflow-x: hidden;
    }

    .blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.28;
      will-change: transform;
    }
    .blob-1 {
      width: 320px;
      height: 320px;
      background: #e8d5a3;
      top: -80px;
      right: -100px;
      animation: blob-float 18s ease-in-out infinite;
    }
    .blob-2 {
      width: 280px;
      height: 280px;
      background: #e2e8f0;
      bottom: -60px;
      left: -80px;
      animation: blob-float 22s ease-in-out infinite reverse;
      animation-delay: -5s;
    }
    .blob-3 {
      width: 200px;
      height: 200px;
      background: #f0e6c8;
      top: 50%;
      left: 10%;
      opacity: 0.18;
      animation: blob-float 20s ease-in-out infinite;
      animation-delay: -10s;
    }
    .blob-4 {
      width: 180px;
      height: 180px;
      background: var(--t4l-dark);
      bottom: 20%;
      right: 15%;
      opacity: 0.08;
      animation: blob-float 25s ease-in-out infinite reverse;
      animation-delay: -2s;
    }
    @keyframes blob-float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -15px) scale(1.05); }
      66% { transform: translate(-15px, 10px) scale(0.98); }
    }

    .wrapper {
      width: 580px;
      max-width: 100%;
      position: relative;
      z-index: 1;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border: 1px solid #e5e7eb;
      min-height: 420px;
    }

    .card-brand-top {
      padding: 14px 28px;
      background: #ffffff;
      border-bottom: 2px solid var(--t4l-gold);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .card-brand-top .brand-logo { width: 28px; height: 28px; border-radius: 0; object-fit: contain; }
    .card-brand-top .brand-text { font-size: 13px; font-weight: 700; color: var(--t4l-dark); letter-spacing: 0.02em; }
    .card-brand-top .brand-sub { font-size: 10px; color: #64748b; font-weight: 500; }

    .card-header {
      padding: 28px 28px 24px;
      background: var(--t4l-dark);
      color: #fff;
    }

    .badge-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pill-esg {
      background: var(--t4l-gold-muted);
      color: #f0e6c8;
    }
    .pill-biz {
      background: rgba(255,255,255,0.12);
      color: #a7f3d0;
    }
    .pill-category {
      background: rgba(255,255,255,0.1);
      color: #94a3b8;
    }
    .pill-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      display: inline-block;
    }
    .pill-esg .pill-dot { background: var(--t4l-gold); }
    .pill-biz .pill-dot { background: #34d399; }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 8px;
      color: #fff;
      letter-spacing: -0.01em;
    }
    .card-subtitle {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-subtitle.expanded {
      -webkit-line-clamp: unset;
      overflow: visible;
      display: block;
    }
    .view-more-toggle {
      font-size: 12px;
      color: var(--t4l-gold);
      cursor: pointer;
      margin-top: 6px;
      font-weight: 500;
      background: none;
      border: none;
      padding: 0;
      text-decoration: underline;
    }
    .view-more-toggle:hover { color: #f0e6c8; }
    .metric-box .view-more-toggle { margin-top: 8px; font-size: 12px; color: var(--t4l-gold); }
    .metric-box .view-more-toggle:hover { color: var(--t4l-gold-hover); }

    .card-creator {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 10px;
      font-weight: 500;
    }
    .card-creator span { color: #e2e8f0; }

    .card-body {
      padding: 26px 28px 26px;
      background: #fff;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }
    .metric-box {
      background: #fafafa;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .metric-box.full-width { grid-column: 1 / -1; }
    .metric-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .metric-value {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.02em;
    }
    .metric-value.small {
      font-size: 14px;
      font-weight: 500;
      color: #475569;
      line-height: 1.45;
    }

    .verification-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #475569;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
    }
    .verification-badge.tier-2 {
      background: #ecfdf5;
      color: #047857;
      border-color: #a7f3d0;
    }
    .verification-badge.tier-3 {
      background: #ecfdf5;
      color: #065f46;
      border-color: #6ee7b7;
    }

    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 0 0 20px;
    }

    .cta-section {
      text-align: center;
      margin-bottom: 22px;
    }
    .cta-label {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 12px;
    }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 26px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      cursor: pointer;
      border: none;
    }
    .cta-btn-partner {
      background: var(--t4l-gold);
      color: #1a1d24;
    }
    .cta-btn-partner:hover {
      background: var(--t4l-gold-hover);
      color: #fff;
    }
    .cta-btn-ambassador {
      background: var(--t4l-gold);
      color: #1a1d24;
    }
    .cta-btn-ambassador:hover {
      background: var(--t4l-gold-hover);
      color: #fff;
    }

    .card-share-section {
      padding-top: 18px;
      border-top: 1px solid #e2e8f0;
    }
    .card-share-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .card-share-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .card-footer {
      padding: 16px 28px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #ffffff;
      border-bottom: 2px solid var(--t4l-gold);
    }
    .brand-line {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-logo {
      width: 26px;
      height: 26px;
      border-radius: 0;
      object-fit: contain;
    }
    .brand-text {
      font-size: 12px;
      font-weight: 700;
      color: var(--t4l-dark);
      letter-spacing: 0.02em;
    }
    .brand-sub {
      font-size: 10px;
      color: #64748b;
      font-weight: 500;
    }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid #e2e8f0;
      background: #fff;
      color: #475569;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .share-btn:hover {
      background: #fffbeb;
      border-color: var(--t4l-gold);
      color: var(--t4l-dark);
    }
    .share-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
      font-size: 14px;
    }
    .loading .spinner {
      width: 28px; height: 28px;
      border: 2px solid #e2e8f0;
      border-top-color: #64748b;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <div class="wrapper">
    <div class="card" id="cardRoot" style="display:none;">
      <!-- Brand at top (Section 11 layout) -->
      <div class="card-brand-top">
        <img src="/images/favicon.png" alt="T4L" class="brand-logo" onerror="this.style.display='none'"/>
        <div>
          <div class="brand-text">Transformation Leader</div>
          <div class="brand-sub">Positive Impact &middot; Sustainable Change</div>
        </div>
      </div>
      <!-- Header -->
      <div class="card-header">
        <div class="badge-row">
          <span class="pill pill-esg" id="pillType"><span class="pill-dot"></span> ESG Impact</span>
          <span class="pill pill-category" id="pillCategory">Impact</span>
        </div>
        <div class="card-title" id="cardTitle">Impact Title</div>
        <div class="card-subtitle" id="cardSubtitle">Description goes here.</div>
        <button type="button" class="view-more-toggle" id="subtitleViewMore" style="display:none;">View more</button>
        <div class="card-creator" id="cardCreator" style="display:none;">By <span id="cardCreatorName"></span></div>
      </div>

      <!-- Body -->
      <div class="card-body">
        <div class="metrics-grid" id="metricsGrid">
          <!-- Filled by JS -->
        </div>

        <div id="verificationBadge" style="display:none;"></div>

        <div class="divider"></div>

        <div class="cta-section">
          <div class="cta-label" id="ctaLabel">Want to create impact like this?</div>
          <a class="cta-btn cta-btn-partner" id="ctaBtn" href="#">
            <span id="ctaBtnText">Become a T4L Partner</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
        </div>

        <!-- Share (inside card) -->
        <div class="card-share-section" id="shareBar" style="display:none;">
          <div class="card-share-label">Share this impact</div>
          <div class="card-share-bar">
            <button class="share-btn" id="btnCopyLink">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              Copy Link
            </button>
            <a class="share-btn" id="btnLinkedIn" href="#" target="_blank">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
              LinkedIn
            </a>
            <a class="share-btn" id="btnWhatsApp" href="#" target="_blank">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              WhatsApp
            </a>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="card-footer">
        <div class="brand-line">
          <img src="/images/favicon.png" alt="T4L" class="brand-logo" onerror="this.style.display='none'"/>
          <div>
            <div class="brand-text">Transformation Leader</div>
            <div class="brand-sub">Positive Impact &middot; Sustainable Change</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      Loading impact card...
    </div>
  </div>

  <script>
    const PARTNER_PLATFORM = 'https://ambassadors.t4leader.com';
    const TIER_PLATFORM = 'https://tier.t4leader.com';

    function detectPlatform() {
      const host = window.location.hostname;
      const origin = window.location.origin;
      if (origin.includes('tier.t4leader.com')) return 'tier';
      return 'partner';
    }

    function fmtRoundedPeople(n) {
      const v = parseFloat(n) || 0;
      if (v <= 0) return '0';
      if (v < 10) return v.toString();
      const rounded = Math.floor(v / 10) * 10;
      return rounded.toLocaleString() + '+';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function buildMetricBox(label, value, fullWidth) {
      const div = document.createElement('div');
      div.className = 'metric-box' + (fullWidth ? ' full-width' : '');
      div.innerHTML = `<div class="metric-label">${escapeHtml(label)}</div><div class="metric-value${fullWidth ? ' small' : ''}">${escapeHtml(value)}</div>`;
      return div;
    }

    async function loadCard() {
      const params = new URLSearchParams(window.location.search);
      const entryId = params.get('entry');
      if (!entryId) { document.getElementById('loadingState').innerHTML = '<p>No entry specified.</p>'; return; }

      try {
        const res = await fetch('/api/public/impact-entry/' + encodeURIComponent(entryId));
        const data = await res.json();
        if (!res.ok || !data.entry) { document.getElementById('loadingState').innerHTML = '<p>Entry not found.</p>'; return; }
        const e = data.entry;
        const platform = detectPlatform();
        const isBusiness = e.impact_type === 'business_outcome';

        // Pills
        const pillType = document.getElementById('pillType');
        const pillCat = document.getElementById('pillCategory');
        if (isBusiness) {
          pillType.innerHTML = '<span class="pill-dot"></span> Business Outcome';
          pillType.className = 'pill pill-biz';
        } else {
          pillType.innerHTML = '<span class="pill-dot"></span> ESG Impact';
          pillType.className = 'pill pill-esg';
        }
        pillCat.textContent = e.esg_category ? e.esg_category.charAt(0).toUpperCase() + e.esg_category.slice(1) : (e.waste_primary || 'Impact');

        // Title (activity title per Section 11.1) & subtitle (description; for Business, body shows outcome statement)
        const activityTitle = e.title || (isBusiness ? 'Business Outcome' : 'Impact Entry');
        document.getElementById('cardTitle').textContent = activityTitle;
        const desc = isBusiness ? '' : (e.description || '');
        const subtitleEl = document.getElementById('cardSubtitle');
        const subtitleViewMoreBtn = document.getElementById('subtitleViewMore');
        const descTruncated = desc.length > 120 ? desc.slice(0, 117) + '...' : desc;
        subtitleEl.textContent = descTruncated;
        subtitleEl.style.display = desc ? 'block' : 'none';
        subtitleEl.classList.remove('expanded');
        if (desc.length > 120) {
          subtitleViewMoreBtn.style.display = 'block';
          subtitleViewMoreBtn.textContent = 'View more';
          subtitleViewMoreBtn.onclick = function () {
            const isExp = subtitleEl.classList.toggle('expanded');
            subtitleEl.textContent = isExp ? desc : descTruncated;
            subtitleViewMoreBtn.textContent = isExp ? 'View less' : 'View more';
          };
        } else {
          subtitleViewMoreBtn.style.display = 'none';
        }

        // Creator (organization or person name)
        const creatorEl = document.getElementById('cardCreator');
        const creatorNameEl = document.getElementById('cardCreatorName');
        if (e.creator_display) {
          creatorNameEl.textContent = e.creator_display;
          creatorEl.style.display = 'block';
        } else {
          creatorEl.style.display = 'none';
        }

        // Metrics — Section 11: NO USD values, NO verification tier. ESG: rounded people + hours. Business: outcome statement only.
        const grid = document.getElementById('metricsGrid');
        grid.innerHTML = '';
        if (isBusiness) {
          if (e.outcome_statement) {
            const outcomeFull = e.outcome_statement;
            const outcomeTruncated = outcomeFull.length > 200 ? outcomeFull.slice(0, 197) + '...' : outcomeFull;
            const outcomeBox = buildMetricBox('Outcome', '"' + outcomeTruncated + '"', true);
            if (outcomeFull.length > 200) {
              const valueEl = outcomeBox.querySelector('.metric-value');
              const toggleBtn = document.createElement('button');
              toggleBtn.type = 'button';
              toggleBtn.className = 'view-more-toggle';
              toggleBtn.textContent = 'View more';
              toggleBtn.onclick = function () {
                const isExp = valueEl.dataset.expanded === '1';
                valueEl.textContent = isExp ? '"' + outcomeTruncated + '"' : '"' + outcomeFull + '"';
                valueEl.dataset.expanded = isExp ? '0' : '1';
                toggleBtn.textContent = isExp ? 'View more' : 'View less';
              };
              outcomeBox.appendChild(toggleBtn);
            }
            grid.appendChild(outcomeBox);
          }
        } else {
          grid.appendChild(buildMetricBox('People reached', fmtRoundedPeople(e.people_impacted), false));
          const hours = parseFloat(e.hours_contributed) || 0;
          if (hours > 0) {
            grid.appendChild(buildMetricBox('Hours contributed', String(Math.floor(hours)), false));
          }
        }

        // Verification badge — Section 11.2: Must NOT show verification tier (Tier 1/2/3). Hide entirely.
        document.getElementById('verificationBadge').style.display = 'none';

        // CTA
        const ctaBtn = document.getElementById('ctaBtn');
        const ctaBtnText = document.getElementById('ctaBtnText');
        const ctaLabel = document.getElementById('ctaLabel');
        if (platform === 'tier') {
          ctaLabel.textContent = 'Track your own impact as an ambassador';
          ctaBtnText.textContent = 'Go to Ambassador Impact Log';
          ctaBtn.href = TIER_PLATFORM + '/impactlog';
          ctaBtn.className = 'cta-btn cta-btn-ambassador';
        } else {
          ctaLabel.textContent = 'Want to create impact like this?';
          ctaBtnText.textContent = 'Become a T4L Partner';
          ctaBtn.href = PARTNER_PLATFORM + '/partner-signin.html';
          ctaBtn.className = 'cta-btn cta-btn-partner';
        }
        // Share links (no USD per Section 11)
        const shareUrl = window.location.href;
        const shareText = isBusiness
          ? `Check out this impact: "${e.title}" via Transformation Leader.`
          : `Check out this impact: "${e.title}" — ${fmtRoundedPeople(e.people_impacted)} people reached via Transformation Leader.`;
        document.getElementById('btnLinkedIn').href = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(shareUrl)}`;
        document.getElementById('btnWhatsApp').href = `https://wa.me/?text=${encodeURIComponent(shareText + ' ' + shareUrl)}`;
        document.getElementById('btnCopyLink').addEventListener('click', () => {
          navigator.clipboard.writeText(shareUrl).then(() => {
            const btn = document.getElementById('btnCopyLink');
            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
            setTimeout(() => { btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy Link'; }, 2000);
          });
        });

        // OG tags
        document.getElementById('ogTitle').content = e.title + ' | Transformation Leader Impact';
        document.getElementById('ogDesc').content = desc.length > 160 ? desc.slice(0, 157) + '...' : desc;

        // Show
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('cardRoot').style.display = 'block';
        document.getElementById('shareBar').style.display = 'block';

      } catch (err) {
        console.error('Failed to load share card:', err);
        document.getElementById('loadingState').innerHTML = '<p>Failed to load impact card.</p>';
      }
    }

    loadCard();
  </script>
</body>
</html>
